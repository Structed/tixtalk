# Compose override for Cloudflare-proxied deployments.
# Uses internal TLS (self-signed) since Cloudflare handles edge certificates.
# Requires Cloudflare SSL/TLS mode set to "Full" (not "Full Strict").
# Used automatically by deploy.sh when CLOUDFLARE_DNS_CHALLENGE=true.
# Manual usage: docker compose -f docker-compose.yml -f docker-compose.cloudflare.yml up -d
services:
  caddy:
    volumes:
      - ./caddy/Caddyfile.dns:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - pretalx_data:/srv/pretalx:ro
    environment:
      DOMAIN: ${DOMAIN}
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "--no-check-certificate", "https://localhost:443"]
