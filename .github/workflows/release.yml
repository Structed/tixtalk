name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and publish
        run: dotnet run --project build -- Publish --configuration Release

      - name: Create Windows zip
        run: |
          mkdir -p output/packages
          cd output/publish/win-x64
          zip -r ../../packages/tixtalk-win-x64.zip .

      - name: Install nfpm
        run: |
          wget -q https://github.com/goreleaser/nfpm/releases/latest/download/nfpm_amd64.deb
          sudo dpkg -i nfpm_amd64.deb

      - name: Create .deb package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }} nfpm package \
            --config nfpm.yaml \
            --packager deb \
            --target output/packages/tixtalk_${{ steps.version.outputs.VERSION }}_amd64.deb

      - name: Create .rpm package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }} nfpm package \
            --config nfpm.yaml \
            --packager rpm \
            --target output/packages/tixtalk-${{ steps.version.outputs.VERSION }}-1.x86_64.rpm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            output/packages/tixtalk-win-x64.zip
            output/packages/tixtalk_*.deb
            output/packages/tixtalk-*.rpm
